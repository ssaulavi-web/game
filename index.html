<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>부르즈 할리파: 얼티밋 어센트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js 사운드 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Jua', sans-serif;
            touch-action: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        #startScreen {
            background: rgba(0, 0, 0, 0.85);
        }

        #winScreen {
            display: none;
            background: rgba(0, 0, 0, 0.5);
            z-index: 20;
        }

        .jump-btn {
            pointer-events: auto;
            user-select: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 0 #1e40af, 0 10px 20px rgba(0,0,0,0.3);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin: 20px;
            opacity: 0.8;
            transition: transform 0.1s;
        }
        
        .jump-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1e40af, 0 5px 10px rgba(0,0,0,0.3);
        }

        #mobile-controls {
            display: none;
            width: 100%;
            padding: 20px;
            pointer-events: auto;
            justify-content: space-between;
            align-items: flex-end;
        }

        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
            .pc-guide {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="p-4 flex justify-between items-start">
            <div class="bg-black/50 text-white px-4 py-2 rounded-xl border border-white/20 backdrop-blur-sm shadow-lg">
                <span class="text-yellow-400 text-3xl font-bold drop-shadow-md" id="scoreDisplay">0m</span>
                <span class="text-lg opacity-90"> / 1000m (두쫀쿠)</span>
            </div>
            <div class="pc-guide bg-black/50 text-white px-4 py-2 rounded-xl text-sm border border-white/20">
                ⌨️ 이동: ← → | 점프: 스페이스바
            </div>
        </div>

        <div id="mobile-controls">
            <div class="flex gap-2">
                <button id="btn-left" class="jump-btn" style="width:65px; height:65px;">◀</button>
                <button id="btn-right" class="jump-btn" style="width:65px; height:65px;">▶</button>
            </div>
            <button id="btn-jump" class="jump-btn" style="width:90px; height:90px;">JUMP</button>
        </div>
    </div>

    <!-- 시작 화면 -->
    <div id="startScreen" class="screen-overlay">
        <h1 class="text-5xl md:text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 to-yellow-600 mb-4 text-center drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]">
            부르즈 할리파<br><span class="text-4xl text-white">얼티밋 어센트</span>
        </h1>
        <div class="bg-blue-900/50 p-6 rounded-2xl border border-blue-400/30 text-center mb-8">
            <p class="text-2xl mb-2 text-blue-200">👑 1000m 꼭대기의 <span class="text-yellow-400 font-bold">'두쫀쿠'</span>를 찾아라!</p>
            <p class="text-lg text-gray-300">소리를 켜고 화면을 클릭하여 모험을 시작하세요.</p>
        </div>
        <p class="text-2xl animate-bounce text-white font-bold bg-green-500 px-8 py-4 rounded-full shadow-[0_0_15px_rgba(34,197,94,0.6)]">
            CLICK TO START!
        </p>
    </div>

    <!-- 승리 화면 -->
    <div id="winScreen" class="screen-overlay">
        <div class="text-8xl mb-4 animate-bounce">🏆</div>
        <h1 class="text-6xl font-bold text-yellow-400 mb-4 text-center drop-shadow-xl">
            두쫀쿠 획득 성공!
        </h1>
        <p class="text-3xl text-white mb-8">부르즈 할리파 정복을 축하합니다!</p>
        <button id="btn-restart" class="bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 px-8 rounded-full shadow-lg transition-transform hover:scale-110">
            다시 도전하기
        </button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const winScreen = document.getElementById('winScreen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const restartBtn = document.getElementById('btn-restart');

        let width, height;
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        let isPlaying = false;
        let isGameOver = false;
        let cameraY = 0;
        let maxHeight = 0; 
        let frames = 0;
        let startY = 0; // 시작 바닥의 Y좌표
        const meterRatio = 10; // 10픽셀당 1m (아이들이 더 빨리 1000m에 도달할 수 있도록 상향)

        const keys = { left: false, right: false, up: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                if(!keys.up && isPlaying && !isGameOver) playJumpSound(); // 처음 누를 때만 소리 재생
                keys.up = true;
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
        });

        const bindTouch = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if(key === 'up' && !keys.up && isPlaying && !isGameOver) playJumpSound();
                keys[key] = true; 
            });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        };
        bindTouch('btn-left', 'left');
        bindTouch('btn-right', 'right');
        bindTouch('btn-jump', 'up');

        let audioInitialized = false;
        let jumpSynth, winSynth, bgmSynth, bgmLoop;

        async function initAudio() {
            if (audioInitialized) return;
            await Tone.start();
            
            // 점프 효과음 (귀여운 통통 소리)
            jumpSynth = new Tone.Synth({
                oscillator: { type: "triangle" },
                envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 }
            }).toDestination();
            jumpSynth.volume.value = -8;

            // 승리 팡파르
            winSynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "square" },
                envelope: { attack: 0.05, decay: 0.2, sustain: 0.5, release: 1 }
            }).toDestination();
            winSynth.volume.value = -5;

            // 신비로운 배경음악 (우주 느낌의 아르페지오)
            bgmSynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "sine" },
                envelope: { attack: 0.5, decay: 0.5, sustain: 0.5, release: 1 }
            }).toDestination();
            bgmSynth.volume.value = -15;

            const notes = ["C4", "G4", "A4", "E5", "D5", "C5", "G4", "A4"];
            let step = 0;
            bgmLoop = new Tone.Loop(time => {
                bgmSynth.triggerAttackRelease(notes[step % notes.length], "8n", time);
                step++;
            }, "4n");
            
            Tone.Transport.bpm.value = 120;
            Tone.Transport.start();
            bgmLoop.start(0);

            audioInitialized = true;
        }

        function playJumpSound() {
            if (jumpSynth && player.isGrounded) {
                // 약간 랜덤한 피치로 뿅소리
                const pitches = ["C5", "E5", "G5"];
                const randomPitch = pitches[Math.floor(Math.random() * pitches.length)];
                jumpSynth.triggerAttackRelease(randomPitch, "16n");
            }
        }

        function playWinSound() {
            if (winSynth) {
                const now = Tone.now();
                winSynth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "2n", now);
                winSynth.triggerAttackRelease(["F4", "A4", "C5", "F5"], "2n", now + 0.6);
                winSynth.triggerAttackRelease(["G4", "B4", "D5", "G5"], "1m", now + 1.2);
            }
        }

        const player = {
            x: 0, y: 0,
            width: 40, height: 60,
            vx: 0, vy: 0,
            speed: 8,
            jumpForce: -18, // 시원한 점프력
            gravity: 0.7,
            isGrounded: false,
            facingRight: true,

            update() {
                if (keys.left) { this.vx = -this.speed; this.facingRight = false; }
                else if (keys.right) { this.vx = this.speed; this.facingRight = true; }
                else this.vx *= 0.8;

                this.x += this.vx;

                if (this.x < 0) this.x = 0;
                if (this.x + this.width > width) this.x = width - this.width;

                if (keys.up && this.isGrounded) {
                    this.vy = this.jumpForce;
                    this.isGrounded = false;
                }

                this.vy += this.gravity;
                this.y += this.vy;
                this.isGrounded = false;
            },

            draw() {
                ctx.save();
                const renderY = this.y - cameraY;
                const centerX = this.x + this.width / 2;
                const centerY = renderY + this.height / 2;

                ctx.translate(centerX, centerY);
                if (!this.facingRight) ctx.scale(-1, 1); // 좌우 반전

                // 로블록스 눕(Noob) 스타일 디자인
                let isMoving = Math.abs(this.vx) > 0.5;
                let legAnim = isMoving && !this.isGrounded ? Math.sin(frames * 0.4) * 8 : 0;

                // 머리 (노란색)
                ctx.fillStyle = '#facc15'; 
                ctx.fillRect(-12, -30, 24, 24);
                // 눈과 입 (살짝 귀엽게)
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, -22, 4, 4); // 앞 눈
                ctx.fillRect(8, -22, 4, 4); // 뒤 눈
                ctx.fillRect(2, -14, 8, 3); // 입

                // 몸통 (파란색)
                ctx.fillStyle = '#3b82f6';
                ctx.fillRect(-15, -6, 30, 30);

                // 팔 (노란색)
                ctx.fillStyle = '#facc15';
                ctx.fillRect( -5, -6, 10, 22); // 앞 팔 (움직임 효과 생략 가능)

                // 다리 (초록색) - 걸을 때 교차
                ctx.fillStyle = '#4ade80';
                ctx.fillRect(-15, 24 + legAnim, 12, 18); // 왼쪽 다리
                ctx.fillStyle = '#22c55e'; // 약간 더 어두운 초록
                ctx.fillRect(3, 24 - legAnim, 12, 18); // 오른쪽 다리

                ctx.restore();
            }
        };

        let platforms = [];
        let stars = [];
        let clouds = [];
        let fireworks = [];
        let dujjonku = { x: 0, y: 0, collected: false, active: false };

        class Platform {
            constructor(x, y, w, isGround = false) {
                this.x = x;
                this.y = y;
                this.width = w;
                this.height = 20;
                this.isGround = isGround;
            }

            draw() {
                const renderY = this.y - cameraY;
                if (renderY < -100 || renderY > height + 100) return;

                ctx.save();
                if (this.isGround) {
                    ctx.fillStyle = '#475569';
                    ctx.fillRect(-1000, renderY, width + 2000, height);
                } else {
                    // 눈에 확 띄는 네온 에메랄드 발판
                    ctx.shadowColor = '#10b981';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#34d399'; 
                    ctx.beginPath();
                    ctx.roundRect(this.x, renderY, this.width, this.height, 10);
                    ctx.fill();
                    
                    ctx.fillStyle = '#a7f3d0';
                    ctx.beginPath();
                    ctx.roundRect(this.x + 2, renderY + 2, this.width - 4, 4, 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 5 + 3;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 중력
                this.life -= 0.015;
            }
            draw() {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y - cameraY, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function initLevel() {
            platforms = [];
            fireworks = [];
            
            startY = height - 100;
            platforms.push(new Platform(0, startY, width, true)); // 바닥
            
            player.width = 40;
            player.height = 60;
            player.x = width / 2 - player.width / 2;
            player.y = startY - player.height;
            player.vy = 0;
            cameraY = 0;
            maxHeight = 0;
            isGameOver = false;
            dujjonku.collected = false;

            let lastY = startY;
            let currentX = width / 2;
            let direction = 1;
            let pWidth = 140; // 넉넉한 초기 발판

            // 1000m 목표 Y좌표 = startY - 10000 (meterRatio = 10 이므로)
            let targetY = startY - 10000;

            // 발판 생성 루프 (목표 높이 도달할 때까지)
            let stepCounter = 0;
            while (lastY > targetY) {
                // 첫 발판은 캐릭터 바로 머리 위
                if (stepCounter === 0) {
                    lastY -= 120;
                    currentX = width / 2 - pWidth / 2;
                } else {
                    lastY -= (90 + Math.random() * 30); // 90~120 높이 상승
                    let stepX = Math.random() * 80 + 100; // 좌우 이동 폭
                    currentX += direction * stepX;
                    
                    // 벽 튕기기
                    if (currentX < 20) {
                        currentX = 20;
                        direction = 1;
                    } else if (currentX + pWidth > width - 20) {
                        currentX = width - pWidth - 20;
                        direction = -1;
                    }
                }
                
                // 고도가 높아질수록 발판이 살짝 좁아짐 (최소 80)
                let currentWidth = Math.max(80, pWidth - (stepCounter * 0.5));
                platforms.push(new Platform(currentX, lastY, currentWidth, false));
                stepCounter++;
            }

            // 가장 마지막 발판 위에 '두쫀쿠' 배치
            let lastPlatform = platforms[platforms.length - 1];
            dujjonku.x = lastPlatform.x + lastPlatform.width / 2;
            dujjonku.y = lastPlatform.y - 60; // 발판 위
            dujjonku.active = true;

            initEnvironment();
        }

        function initEnvironment() {
            clouds = [];
            stars = [];
            for(let i=0; i<40; i++) {
                clouds.push({
                    x: Math.random() * width,
                    y: startY - Math.random() * 11000, 
                    size: Math.random() * 60 + 40,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: startY - 5000 - Math.random() * 6000, // 높은 우주 구간에만
                    size: Math.random() * 2 + 1,
                    alpha: Math.random()
                });
            }
        }

        function checkCollisions() {
            // 발판 충돌 (내려올 때만)
            if (player.vy >= 0) {
                for (let p of platforms) {
                    if (p.y - cameraY > height || p.y - cameraY < -height) continue;

                    // 여유로운 판정 (발끝이 닿을 때)
                    if (player.x + player.width - 15 > p.x && 
                        player.x + 15 < p.x + p.width &&
                        player.y + player.height >= p.y &&
                        player.y + player.height <= p.y + player.vy + 25) { 
                        
                        player.y = p.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                        break; // 한 번 밟으면 끝
                    }
                }
            }

            // 두쫀쿠 획득 체크 (충돌 박스 교차)
            if (!dujjonku.collected && dujjonku.active) {
                let dx = Math.abs((player.x + player.width/2) - dujjonku.x);
                let dy = Math.abs((player.y + player.height/2) - dujjonku.y);
                if (dx < 50 && dy < 60) {
                    winGame();
                }
            }
        }

        function spawnFireworks(x, y) {
            const colors = ['#facc15', '#ef4444', '#3b82f6', '#22c55e', '#a855f7'];
            for(let i=0; i<100; i++) {
                fireworks.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
            }
        }

        function winGame() {
            dujjonku.collected = true;
            isGameOver = true;
            playWinSound();
            spawnFireworks(dujjonku.x, dujjonku.y);
            
            // 승리 UI 표시
            setTimeout(() => {
                winScreen.style.display = 'flex';
                // 승리 시 BGM 멈춤
                if(bgmLoop) bgmLoop.stop();
            }, 1000);
        }

        function drawBackground(progress) {
            let grad = ctx.createLinearGradient(0, 0, 0, height);
            if (progress < 0.3) {
                grad.addColorStop(0, '#0ea5e9'); // 하늘색
                grad.addColorStop(1, '#e0f2fe');
            } else if (progress < 0.6) {
                grad.addColorStop(0, '#1e1b4b'); // 밤/노을 전환
                grad.addColorStop(0.5, '#be123c');
                grad.addColorStop(1, '#f59e0b');
            } else {
                grad.addColorStop(0, '#020617'); // 우주
                grad.addColorStop(1, '#0f172a');
            }
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            if (progress > 0.4) {
                ctx.fillStyle = 'white';
                stars.forEach(s => {
                    let renderY = s.y - cameraY * 0.1;
                    if(renderY > 0 && renderY < height) {
                        ctx.globalAlpha = s.alpha + Math.sin(frames * 0.05 + s.x) * 0.5;
                        ctx.beginPath();
                        ctx.arc(s.x, renderY, s.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1.0;
                    }
                });
            }
        }

        function drawBurjKhalifa(progress) {
            ctx.save();
            let centerX = width / 2;
            let buildingRenderY = startY - cameraY * 0.8; 

            let bWidth = 350;
            let currentY = buildingRenderY;
            
            // 층수 그리기 (약 1000m 높이까지 제한)
            let maxBuildingY = startY - 10000 * 0.8; // 시차 비율 0.8 고려

            for(let i=0; i<80; i++) {
                if (currentY < maxBuildingY) break; // 목표 지점 이상 그리지 않음
                if (currentY > height + 500) { 
                    currentY -= 150;
                    bWidth *= 0.94;
                    continue;
                }

                if (progress < 0.4) {
                    ctx.fillStyle = i % 2 === 0 ? '#94a3b8' : '#cbd5e1';
                } else if (progress < 0.7) {
                    ctx.fillStyle = i % 2 === 0 ? '#334155' : '#475569';
                } else {
                    ctx.fillStyle = i % 2 === 0 ? '#0f172a' : '#1e293b';
                }

                ctx.fillRect(centerX - bWidth/2, currentY - 150, bWidth, 150);
                
                // 창문 불빛
                if (progress >= 0.5 && Math.random() > 0.3) {
                    ctx.fillStyle = '#38bdf8'; 
                    ctx.fillRect(centerX - bWidth/2 + 15, currentY - 100, bWidth - 30, 10);
                }

                currentY -= 150;
                bWidth *= 0.94; 
            }

            // 황금 첨탑 
            if (currentY > -1000 && currentY < height + 1000) {
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath();
                ctx.moveTo(centerX - bWidth/2, currentY);
                ctx.lineTo(centerX + bWidth/2, currentY);
                ctx.lineTo(centerX, currentY - 400); // 뾰족한 탑
                ctx.fill();
            }

            ctx.restore();
        }

        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            clouds.forEach(c => {
                let renderY = c.y - cameraY * 0.5;
                if(renderY > -100 && renderY < height + 100) {
                    ctx.beginPath();
                    ctx.arc(c.x, renderY, c.size, 0, Math.PI*2);
                    ctx.arc(c.x + c.size*0.8, renderY - c.size*0.2, c.size*0.8, 0, Math.PI*2);
                    ctx.arc(c.x - c.size*0.8, renderY + c.size*0.1, c.size*0.7, 0, Math.PI*2);
                    ctx.fill();
                    
                    c.x -= c.speed;
                    if (c.x < -c.size*2) c.x = width + c.size*2;
                }
            });
        }

        function drawDujjonku() {
            if (!dujjonku.active || dujjonku.collected) return;
            const renderY = dujjonku.y - cameraY;
            
            if (renderY > -100 && renderY < height + 100) {
                ctx.save();
                ctx.translate(dujjonku.x, renderY);
                
                // 둥둥 떠다니는 애니메이션
                let floatOffset = Math.sin(frames * 0.1) * 10;
                ctx.translate(0, floatOffset);

                // 두쫀쿠 이름표
                ctx.fillStyle = '#facc15';
                ctx.font = 'bold 24px Jua';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                ctx.fillText('👑 두쫀쿠', 0, -20);
                
                // 빛나는 후광
                ctx.shadowColor = '#facc15';
                ctx.shadowBlur = 20 + Math.sin(frames * 0.2) * 10;
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(0, 10, 20, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            frames++;

            player.update();
            checkCollisions();

            // 카메라 시점 (플레이어 따라감)
            let targetCameraY = player.y - height / 2 + 100;
            if (targetCameraY < cameraY) {
                cameraY = targetCameraY; 
            }

            // 고도 계산 (10픽셀 = 1m)
            let currentHeightMeters = Math.floor((startY - player.y) / meterRatio);
            if (currentHeightMeters > maxHeight && !dujjonku.collected) {
                maxHeight = currentHeightMeters;
            }
            
            // UI 업데이트 (최대 1000m 고정)
            let displayScore = Math.min(1000, Math.max(0, maxHeight));
            scoreDisplay.innerText = displayScore + "m";
            
            // 추락 처리 (바닥이 아닌 공중에서 화면 밖으로 떨어졌을 때)
            if (player.y > cameraY + height + 200 && !isGameOver) {
                // 게임 오버 (시작 지점으로 리셋)
                // 깜짝 효과음
                if(jumpSynth) jumpSynth.triggerAttackRelease("C3", "8n");
                initLevel();
            }

            // --- 렌더링 ---
            ctx.clearRect(0, 0, width, height);
            
            let progress = Math.min(1, maxHeight / 1000); 
            
            drawBackground(progress);
            drawBurjKhalifa(progress);
            drawClouds();

            platforms.forEach(p => p.draw());
            drawDujjonku();
            player.draw();

            // 폭죽 파티클 그리기
            for(let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].life <= 0) fireworks.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        startScreen.addEventListener('click', async () => {
            await initAudio(); // 사운드 엔진 시작
            startScreen.style.display = 'none';
            if (!isPlaying) {
                isPlaying = true;
                initLevel();
                gameLoop();
            }
        });

        restartBtn.addEventListener('click', () => {
            winScreen.style.display = 'none';
            initLevel();
            if(bgmLoop) bgmLoop.start(); // BGM 다시 재생
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                keys.left = false;
                keys.right = false;
                keys.up = false;
            }
        });
    </script>
</body>
</html>
