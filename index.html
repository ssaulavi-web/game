<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>라온이의 블록 블라스트</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* 기존 fixed 제거 */
    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      font-family: 'Jua', 'Inter', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .safe-padding {
      padding-top: env(safe-area-inset-top, 1rem);
      padding-bottom: env(safe-area-inset-bottom, 1rem);
    }

    .grid-cell {
      transition: background-color 0.1s, transform 0.1s;
    }

    @keyframes line-pop {
      0% {
        transform: scale(1);
        filter: brightness(1.5);
      }
      50% {
        transform: scale(1.15);
        filter: brightness(1.8);
      }
      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    .pop-clear {
      animation: line-pop 0.35s ease-out forwards;
    }

    .puzzle-piece-cell {
      width: 20px;
      height: 20px;
      margin: 1.5px;
      border-radius: 4px;
      flex-shrink: 0 !important;
      display: inline-block;
    }

    @media (min-width: 380px) {
      .puzzle-piece-cell {
        width: 24px;
        height: 24px;
        margin: 2px;
      }
    }

    .candidate-slot {
      touch-action: none;
      user-select: none;
    }
  </style>
</head>

<body class="bg-gradient-to-b from-indigo-100 via-purple-100 to-pink-100 flex flex-col items-center p-4 gap-4">

  <!-- 게임 영역 -->
  <div class="w-full max-w-sm">

    <!-- Main Frame -->
    <div class="w-full h-[100dvh] max-h-[780px] bg-white rounded-[32px] shadow-2xl border-4 border-purple-300 flex flex-col justify-between overflow-hidden relative p-4 safe-padding">

      <!-- Start Screen -->
      <div id="start-screen" class="absolute inset-0 z-30 bg-gradient-to-b from-purple-50 to-indigo-100 flex flex-col justify-between items-center p-6 text-center transition-all duration-500">

        <div class="flex-1 flex flex-col justify-center items-center gap-4 mt-6">

          <div class="w-24 h-24 bg-gradient-to-tr from-pink-400 via-yellow-300 to-indigo-400 rounded-3xl flex items-center justify-center shadow-lg transform rotate-6 border-4 border-white animate-bounce">
            <span class="text-5xl">🧩</span>
          </div>

          <div>
            <h1 class="text-4xl text-indigo-600 font-extrabold tracking-wide drop-shadow-sm leading-tight">
              라온이의<br>블록 블라스트
            </h1>

            <p class="text-indigo-400 text-xs mt-1 font-sans">
              알록달록 똑똑 무한대 퍼즐 게임
            </p>
          </div>

          <div class="bg-white/80 border-2 border-indigo-200 px-5 py-2 rounded-2xl shadow-sm mt-2">
            <p class="text-[11px] text-pink-500 font-bold uppercase tracking-wider">
              🏆 최고 소중한 기록 🏆
            </p>

            <p id="start-best-score" class="text-2xl text-slate-700 font-black">
              0점
            </p>
          </div>

        </div>

        <div class="w-full flex flex-col items-center gap-4 mb-6">

          <button id="start-game-btn" class="w-full py-4 bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600 hover:brightness-105 text-white font-extrabold text-xl rounded-2xl shadow-lg transform active:scale-95 transition-all flex items-center justify-center gap-2 border-b-4 border-purple-800">
            <i class="fa-solid fa-play text-2xl"></i>
            퍼즐 시작하기!
          </button>

          <p class="text-xs text-indigo-400/80">
            👇 마우스나 손가락으로 밀어주면 쏙 들어갑니다!
          </p>

        </div>

      </div>

      <!-- 게임 컨테이너 -->
      <div id="game-container" class="w-full h-full flex flex-col justify-between hidden">

        <!-- 상단 -->
        <div class="flex justify-between items-center bg-purple-50/80 p-3 rounded-2xl border-2 border-purple-100 mb-2">

          <div class="flex gap-4">

            <div class="text-center">
              <span class="text-[10px] text-purple-400 font-bold block">
                내 점수
              </span>

              <span id="score-val" class="text-2xl text-purple-600 font-extrabold">
                0
              </span>
            </div>

            <div class="text-center border-l border-purple-200 pl-4">
              <span class="text-[10px] text-pink-400 font-bold block">
                최고 기록
              </span>

              <span id="best-val" class="text-2xl text-pink-500 font-extrabold">
                0
              </span>
            </div>

          </div>

          <div class="text-center">
            <span class="text-sm text-indigo-600 font-bold tracking-tight block">
              🧩 라온이의 블록 블라스트
            </span>
          </div>

        </div>

        <!-- 보드 -->
        <div class="relative flex-1 flex items-center justify-center my-2 overflow-hidden">

          <div id="game-board"
            class="w-full aspect-square bg-slate-100 rounded-2xl p-2.5 border-4 border-slate-300 relative shadow-inner grid grid-cols-8 gap-1"
            style="grid-template-rows: repeat(8, minmax(0, 1fr));">
          </div>

        </div>

        <!-- 하단 블록 -->
        <div class="bg-indigo-50/70 p-3 rounded-2xl border-2 border-indigo-100 flex justify-around items-center h-28 relative">

          <div class="candidate-slot flex items-center justify-center w-1/3 h-full relative" data-slot="0"></div>

          <div class="candidate-slot flex items-center justify-center w-1/3 h-full relative" data-slot="1"></div>

          <div class="candidate-slot flex items-center justify-center w-1/3 h-full relative" data-slot="2"></div>

        </div>

        <p class="text-center text-[10px] text-slate-400 mt-1.5">
          한 줄을 가득 채우면 팡! 터져요 ✨
        </p>

      </div>

    </div>

  </div>

  <!-- 광고 -->
  <div class="w-full max-w-[700px]">

    <div class="bg-white/90 backdrop-blur-md rounded-3xl shadow-xl border-2 border-purple-100 p-4">

      <div class="text-center mb-3">

        <div class="inline-flex items-center gap-2 bg-gradient-to-r from-pink-500 to-purple-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-md">
          🎁 추천 아이템
        </div>

        <p class="text-xs text-slate-400 mt-2">
          게임하다 발견한 인기 상품 모음 ✨
        </p>

      </div>

      <!-- 쿠팡 광고 -->
      <div class="w-full overflow-hidden flex justify-center">

        <script src="https://ads-partners.coupang.com/g.js"></script>

        <script>
          new PartnersCoupang.G({
            "id": 989708,
            "template": "carousel",
            "trackingCode": "AF3348191",
            "width": "680",
            "height": "140",
            "tsource": ""
          });
        </script>

      </div>

    </div>

  </div>

  <!-- 드래그 고스트 -->
  <div id="drag-ghost"
    class="fixed pointer-events-none z-50 transform -translate-x-1/2 -translate-y-1/2 opacity-0 flex flex-col justify-center items-center">
  </div>

  <!-- 여기부터 원래 JS 그대로 -->
  <script type="module">

    // ⚠️ 중요
    // 네가 올렸던 기존 script 전체를
    // 여기 그대로 붙여넣으면 된다

    // 현재는 화면 테스트용 최소 코드만 넣어둠

    const boardEl = document.getElementById('game-board');

    function createBoard() {
      for (let i = 0; i < 64; i++) {
        const cell = document.createElement('div');
        cell.className =
          'grid-cell w-full h-full bg-white rounded-lg border border-slate-200/50 shadow-sm';
        boardEl.appendChild(cell);
      }
    }

    document.getElementById('start-game-btn').addEventListener('click', () => {
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-container').classList.remove('hidden');
    });

    createBoard();

  </script>

</body>
</html>
