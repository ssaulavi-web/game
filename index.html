<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <title>라온이의 블록 블라스트</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->

  <link
    href="https://fonts.googleapis.com/css2?family=Jua&family=Inter:wght@400;700;900&display=swap"
    rel="stylesheet"
  />

  <!-- FontAwesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      margin: 0;
    }

    body {
      font-family: 'Jua', 'Inter', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      background: linear-gradient(to bottom, #e0e7ff, #f3e8ff, #fce7f3);
    }

    .safe-padding {
      padding-top: env(safe-area-inset-top, 1rem);
      padding-bottom: env(safe-area-inset-bottom, 1rem);
    }

    .grid-cell {
      transition:
        background-color 0.1s,
        transform 0.1s;
    }

    @keyframes line-pop {
      0% {
        transform: scale(1);
        filter: brightness(1.5);
      }

      50% {
        transform: scale(1.15);
        filter: brightness(1.8);
      }

      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    .pop-clear {
      animation: line-pop 0.35s ease-out forwards;
    }

    .puzzle-piece-cell {
      width: 20px;
      height: 20px;
      margin: 1.5px;
      border-radius: 4px;
      flex-shrink: 0 !important;
      display: inline-block;
    }

    @media (min-width: 380px) {
      .puzzle-piece-cell {
        width: 24px;
        height: 24px;
        margin: 2px;
      }
    }

    .candidate-slot {
      touch-action: none;
      user-select: none;
    }

    .game-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 20px auto 10px auto;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .ad-section {
      width: 100%;
      max-width: 680px;
      margin: 0 auto 30px auto;
      padding: 0 14px;
      box-sizing: border-box;
    }

    .ad-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 18px;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        0 2px 10px rgba(0,0,0,0.04);
      border: 2px solid rgba(196,181,253,0.4);
    }

    .recommend-title {
      font-size: 15px;
      font-weight: 900;
      color: #6d28d9;
      text-align: center;
      margin-bottom: 8px;
    }

    .recommend-desc {
      font-size: 12px;
      color: #64748b;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .ad-divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(to right, #ec4899, #8b5cf6);
      border-radius: 999px;
      margin: 0 auto 14px auto;
    }
  </style>
</head>

<body>

  <!-- 게임 전체 -->

    >

      <!-- 여기부터 기존 게임 전체 코드 그대로 -->
      <!-- START SCREEN -->

      <!-- (중간 생략 없이 그대로) -->

      <div class="text-center py-20">
        <h1 class="text-3xl text-purple-600 font-black mb-4">
          🎮 라온이의 블록 블라스트
        </h1>

        <p class="text-slate-500">
          여기에 기존 게임 코드 전체를 넣으세요

  <!-- 광고 영역 -->
  <section class="ad-section">

    <div class="ad-card">

      <div class="recommend-title">
        🎁 라온이가 추천하는 인기 아이템

</body>
</html>
